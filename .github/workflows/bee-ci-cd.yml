name: BEE CI/CD

on:
  push:
    branches:
      - main
    paths-ignore:
      - "**/*.md"

  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: bee-production
  cancel-in-progress: false

jobs:
  ci:
    name: Build and test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout source code
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Build application
        run: npm run build

      - name: Run tests
        run: npm test -- --runInBand

  deploy:
    name: Deploy BEE to VPS
    needs:
      - ci

    runs-on: ubuntu-latest
    timeout-minutes: 20

    environment:
      name: production

    steps:
      - name: Configure SSH
        env:
          SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          KNOWN_HOSTS: ${{ secrets.VPS_KNOWN_HOSTS }}
        run: |
          set -euo pipefail

          install -m 700 -d "$HOME/.ssh"

          printf '%s\n' "$SSH_KEY" \
            > "$HOME/.ssh/id_ed25519"

          chmod 600 "$HOME/.ssh/id_ed25519"

          printf '%s\n' "$KNOWN_HOSTS" \
            > "$HOME/.ssh/known_hosts"

          chmod 600 "$HOME/.ssh/known_hosts"

      - name: Test VPS connection
        env:
          VPS_HOST: ${{ vars.VPS_HOST }}
          VPS_PORT: ${{ vars.VPS_PORT }}
          VPS_USER: ${{ vars.VPS_USER }}
        run: |
          set -euo pipefail

          VPS_HOST="$(printf '%s' "$VPS_HOST" | tr -d '\r\n' | xargs)"
          VPS_PORT="$(printf '%s' "$VPS_PORT" | tr -d '\r\n' | xargs)"
          VPS_USER="$(printf '%s' "$VPS_USER" | tr -d '\r\n' | xargs)"

          ssh \
            -p "$VPS_PORT" \
            -o BatchMode=yes \
            -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=yes \
            -o ConnectTimeout=15 \
            "$VPS_USER@$VPS_HOST" \
            "echo 'SSH connection successful.'"

      - name: Deploy tested commit
        env:
          VPS_HOST: ${{ vars.VPS_HOST }}
          VPS_PORT: ${{ vars.VPS_PORT }}
          VPS_USER: ${{ vars.VPS_USER }}
          VPS_BEE_DIR: ${{ vars.VPS_BEE_DIR }}
          VPS_CONFIG_DIR: ${{ vars.VPS_CONFIG_DIR }}
          REVISION: ${{ github.sha }}
        run: |
          set -euo pipefail

          VPS_HOST="$(printf '%s' "$VPS_HOST" | tr -d '\r\n' | xargs)"
          VPS_PORT="$(printf '%s' "$VPS_PORT" | tr -d '\r\n' | xargs)"
          VPS_USER="$(printf '%s' "$VPS_USER" | tr -d '\r\n' | xargs)"
          VPS_BEE_DIR="$(printf '%s' "$VPS_BEE_DIR" | tr -d '\r\n' | xargs)"
          VPS_CONFIG_DIR="$(printf '%s' "$VPS_CONFIG_DIR" | tr -d '\r\n' | xargs)"
          REMOTE_SCRIPT="$VPS_CONFIG_DIR/scripts/deploy-bee.sh"

          ssh \
            -p "$VPS_PORT" \
            -o BatchMode=yes \
            -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=yes \
            -o ServerAliveInterval=30 \
            -o ServerAliveCountMax=10 \
            "$VPS_USER@$VPS_HOST" \
            "test -f '$REMOTE_SCRIPT' && \
            BEE_DIR='$VPS_BEE_DIR' VPS_DIR='$VPS_CONFIG_DIR' \
            bash '$REMOTE_SCRIPT' '$REVISION'"
